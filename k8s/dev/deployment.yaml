apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-test-deployment
  labels:
    app: app-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-test
  template:
    metadata:
      labels:
        app: app-test
    spec:
      containers:
      - name: app-container
        image: atelier-k8s-app:v1
        ports:
        - containerPort: 3000
        imagePullPolicy: IfNotPresent
        env:                           
        - name: DB_USER                
          valueFrom:                   
            secretKeyRef:              
              name: app-secrets        
              key: DB_USER             
        - name: DB_PASSWORD            
          valueFrom:                   
            secretKeyRef:              
              name: app-secrets        
              key: DB_PASSWORD         
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
      volumes:
      - name: config-volume
        configMap:
          name: app-config